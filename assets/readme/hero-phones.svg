<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" role="img" aria-label="Comparison of two raw monitoring push notifications versus the same incident enriched by Nuncio into a single message with cause, correlation and next steps">
  <rect x="0" y="0" width="900" height="540" rx="14" fill="#0F1717"/>

  <!-- ============ LEFT PHONE: RAW ============ -->
  <g font-family="-apple-system,'SF Pro Text','Segoe UI',Helvetica,Arial,sans-serif">
    <rect x="96" y="24" width="224" height="470" rx="32" fill="#141F1C" stroke="#2A3A36" stroke-width="1.5"/>
    <rect x="105" y="33" width="206" height="452" rx="26" fill="#0B1211"/>
    <rect x="181" y="45" width="54" height="15" rx="7.5" fill="#060D0C"/>
    <text x="208" y="92" text-anchor="middle" font-size="10" fill="#77908A">Tuesday, June 18</text>
    <text x="208" y="132" text-anchor="middle" font-size="44" font-weight="200" fill="#DDE7E4">14:05</text>

    <!-- raw banner 1 -->
    <rect x="116" y="160" width="184" height="74" rx="16" fill="#1B2825" stroke="#273632"/>
    <rect x="126" y="170" width="15" height="15" rx="4.5" fill="#3C4A46"/>
    <text x="147" y="181" font-size="8" letter-spacing="0.8" fill="#8FA39D">MONITORING</text>
    <text x="290" y="181" text-anchor="end" font-size="8" fill="#5E736D">now</text>
    <g font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace" font-size="8.5" fill="#A8B6B1">
      <text x="126" y="199"><tspan fill="#E0A83E">[PROBLEM]</tspan> db-primary /</text>
      <text x="126" y="211">PostgreSQL — CRITICAL: FATAL:</text>
      <text x="126" y="223">remaining connection slots re…</text>
    </g>

    <!-- raw banner 2 -->
    <rect x="116" y="244" width="184" height="74" rx="16" fill="#1B2825" stroke="#273632"/>
    <rect x="126" y="254" width="15" height="15" rx="4.5" fill="#3C4A46"/>
    <text x="147" y="265" font-size="8" letter-spacing="0.8" fill="#8FA39D">MONITORING</text>
    <text x="290" y="265" text-anchor="end" font-size="8" fill="#5E736D">3m ago</text>
    <g font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace" font-size="8.5" fill="#A8B6B1">
      <text x="126" y="283"><tspan fill="#E0A83E">[PROBLEM]</tspan> api-gateway / Memory</text>
      <text x="126" y="295">— CRITICAL: OOM killed,</text>
      <text x="126" y="307">process restarted…</text>
    </g>

    <text x="208" y="516" text-anchor="middle" font-size="11" font-weight="600" letter-spacing="2" fill="#E0A83E">WITHOUT NUNCIO</text>
    <text x="208" y="532" text-anchor="middle" font-size="10" fill="#77908A">two raw alerts — no cause, no link, no next step</text>
  </g>

  <!-- ============ CENTER: SIGNAL PATH ============ -->
  <g font-family="-apple-system,'SF Pro Text','Segoe UI',Helvetica,Arial,sans-serif">
    <line x1="330" y1="259" x2="546" y2="259" stroke="#45B597" stroke-width="2"/>
    <path d="M 546 253 L 562 259 L 546 265 Z" fill="#45B597"/>
    <text x="446" y="241" text-anchor="middle" font-size="9" letter-spacing="1.5" fill="#45B597">ENRICH · CORRELATE</text>
    <text x="446" y="281" text-anchor="middle" font-size="8.5" fill="#77908A">redact · fail-safe</text>
  </g>

  <!-- ============ RIGHT PHONE: ENRICHED ============ -->
  <g font-family="-apple-system,'SF Pro Text','Segoe UI',Helvetica,Arial,sans-serif">
    <rect x="580" y="24" width="224" height="470" rx="32" fill="#141F1C" stroke="#2A3A36" stroke-width="1.5"/>
    <rect x="589" y="33" width="206" height="452" rx="26" fill="#0B1211"/>
    <rect x="665" y="45" width="54" height="15" rx="7.5" fill="#060D0C"/>
    <text x="692" y="92" text-anchor="middle" font-size="10" fill="#77908A">Tuesday, June 18</text>
    <text x="692" y="132" text-anchor="middle" font-size="44" font-weight="200" fill="#DDE7E4">14:05</text>

    <!-- enriched banner -->
    <rect x="600" y="160" width="184" height="192" rx="16" fill="#1C2A26" stroke="#2E4A42"/>
    <rect x="602" y="168" width="3" height="176" rx="1.5" fill="#45B597"/>
    <rect x="612" y="170" width="17" height="17" rx="5" fill="#45B597"/>
    <text x="620.5" y="182.5" text-anchor="middle" font-size="11.5" font-weight="700" font-family="Charter,Georgia,serif" fill="#0F1717">N</text>
    <text x="635" y="182" font-size="8" letter-spacing="1.5" fill="#6FA99A">NUNCIO</text>
    <text x="774" y="182" text-anchor="end" font-size="8" fill="#5E736D">now</text>

    <g font-size="10" font-weight="600" fill="#EDF3F0">
      <text x="612" y="204">❗ db-primary/PostgreSQL —</text>
      <text x="612" y="217">connections exhausted since 14:02</text>
    </g>
    <g font-size="9" fill="#A9BAB4">
      <text x="612" y="236"><tspan fill="#45B597" font-weight="600">Likely caused by</tspan> a connection leak</text>
      <text x="612" y="248">in the api-gateway pool ("remaining</text>
      <text x="612" y="260">connection slots" <tspan fill="#E0A83E">×47</tspan>).</text>
      <text x="612" y="279"><tspan fill="#45B597" font-weight="600">Related:</tspan> api-gateway OOM-restart</text>
      <text x="612" y="291">3 min earlier — same incident.</text>
      <text x="612" y="310"><tspan fill="#45B597" font-weight="600">Next:</tspan> check api-gateway pool cfg;</text>
      <text x="612" y="322" font-size="7.5" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace" fill="#8FB5AA">SELECT count(*) FROM pg_stat_activity</text>
      <text x="612" y="334">confirm the restart cleared it.</text>
    </g>

    <text x="692" y="516" text-anchor="middle" font-size="11" font-weight="600" letter-spacing="2" fill="#45B597">WITH NUNCIO</text>
    <text x="692" y="532" text-anchor="middle" font-size="10" fill="#77908A">one message: what broke, why, what's related, what to check</text>
  </g>
</svg>
